<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const SERVER_URL = window.NAPE_MP_SERVER_URL
  || (location.hostname === "localhost" || location.hostname === "127.0.0.1"
    ? `ws://${location.hostname}:3001`
    : "wss://nape-js-production.up.railway.app");

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const VW = canvas.width;   // viewport width
const VH = canvas.height;  // viewport height

// ─── State ────────────────────────────────────────────────────────────────────
let myPlayerId = null;
let myBodyId = null;
let myColorIdx = 0;
let isSpectator = false;
let playerColors = [];
let playerMeta = [];

// World
let worldW = 4000, worldH = 600;
let level = [];
let coinDefs = [];       // [{id, x, y, alive}]
let sceneObjects = [];
let movingPlatforms = [];

// Camera
let camX = 0, camY = 0;
const CAM_LERP = 0.12;

// Interpolated positions: bodyId → {x, y, rot, px, py, prot, ts, pts}
const bodyState = new Map();

let lastServerFrame = 0;
let lastPingTime = 0;
let ping = 0;

// Coin counter (local)
let myScore = 0;
let coinPopups = []; // {x, y, timer}

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = { left: false, right: false, jump: false };
let pendingEvents = [];
let prevJump = false;

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") keys.left  = true;
  if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = true;
  if (e.key === "ArrowUp"    || e.key === "w" || e.key === "W" || e.key === " ") {
    if (!keys.jump) pendingEvents.push("jumpPressed");
    keys.jump = true;
  }
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault();
});

window.addEventListener("keyup", (e) => {
  if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") keys.left  = false;
  if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
  if (e.key === "ArrowUp"    || e.key === "w" || e.key === "W" || e.key === " ") {
    if (keys.jump) pendingEvents.push("jumpReleased");
    keys.jump = false;
  }
});

// ─── WebSocket ────────────────────────────────────────────────────────────────
let ws = null;
let inputInterval = null;
let reconnectTimeout = null;

function connect() {
  setOverlay(true, "Connecting to server…");
  setStatus(false, "Connecting…");

  ws = new WebSocket(SERVER_URL);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    setStatus(true, "Connected");
    setOverlay(false);
    inputInterval = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) {
        const msg = { type: "input", keys };
        if (pendingEvents.length > 0) {
          msg.events = pendingEvents;
          pendingEvents = [];
        }
        ws.send(JSON.stringify(msg));
      }
    }, 50);
    setInterval(() => {
      lastPingTime = performance.now();
      if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
    }, 2000);
  };

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      handleBinaryFrame(e.data);
    } else {
      handleJsonMessage(JSON.parse(e.data));
    }
  };

  ws.onclose = () => {
    clearInterval(inputInterval);
    setStatus(false, "Disconnected");
    setOverlay(true, "Connection lost. Reconnecting…");
    reconnectTimeout = setTimeout(connect, 3000);
  };

  ws.onerror = () => { ws.close(); };
}

// ─── Message handlers ─────────────────────────────────────────────────────────

function handleJsonMessage(msg) {
  if (msg.type === "init") {
    isSpectator = !!msg.spectator;
    myPlayerId = msg.playerId ?? null;
    myBodyId = msg.bodyId ?? null;
    myColorIdx = msg.colorIdx ?? 0;
    playerColors = msg.playerColors;
    worldW = msg.worldW || 4000;
    worldH = msg.worldH || 600;
    level = msg.level || [];
    coinDefs = msg.coins || [];
    sceneObjects = msg.sceneObjects || [];
    movingPlatforms = msg.movingPlatforms || [];
    playerMeta = msg.players;
    myScore = 0;
    coinPopups = [];

    if (isSpectator) {
      setStatus(true, "Spectating");
    }
    document.getElementById("playerCountText").textContent = `${playerMeta.length} / 8 players`;
    updatePlayerListUI();
  }

  if (msg.type === "players") {
    playerMeta = msg.players;
    document.getElementById("playerCountText").textContent = `${msg.count} / 8 players`;
    updatePlayerListUI();
  }

  if (msg.type === "pong") {
    ping = Math.round(performance.now() - lastPingTime);
    document.getElementById("pingText").textContent = `ping: ${ping}ms`;
  }

  if (msg.type === "coin_pickup") {
    const coin = coinDefs.find(c => c.id === msg.coinId);
    if (coin) {
      coin.alive = false;
      coinPopups.push({ x: coin.x, y: coin.y - 10, timer: 1.0 });
      if (msg.playerId === myPlayerId) {
        myScore++;
        document.getElementById("coinText").innerHTML = `&#9679; ${myScore}`;
      }
    }
  }

  if (msg.type === "coin_respawn") {
    for (const id of msg.coinIds) {
      const coin = coinDefs.find(c => c.id === id);
      if (coin) coin.alive = true;
    }
  }

  if (msg.type === "error") {
    setOverlay(true, msg.message);
  }
}

function handleBinaryFrame(buf) {
  const now = performance.now();
  const view = new DataView(buf);
  const count = view.getUint16(0, true);
  let offset = 2;
  for (let i = 0; i < count; i++) {
    const id  = view.getUint16(offset, true);     offset += 2;
    const x   = view.getFloat32(offset, true);    offset += 4;
    const y   = view.getFloat32(offset, true);    offset += 4;
    const rot = view.getFloat32(offset, true);    offset += 4;

    const prev = bodyState.get(id);
    const stale = prev && (now - prev.ts) > 500;
    bodyState.set(id, {
      x, y, rot,
      px: (prev && !stale) ? prev.x : x,
      py: (prev && !stale) ? prev.y : y,
      prot: (prev && !stale) ? prev.rot : rot,
      ts: now,
      pts: (prev && !stale) ? prev.ts : now - TICK_MS,
    });
  }
  lastServerFrame = now;
}

// ─── Camera ───────────────────────────────────────────────────────────────────

function updateCamera() {
  if (!myBodyId && !isSpectator) return;

  let targetId = myBodyId;
  // Spectator: follow first player
  if (isSpectator && playerMeta.length > 0) {
    targetId = playerMeta[0].bodyId;
  }
  if (!targetId) return;

  const state = bodyState.get(targetId);
  if (!state) return;

  const now = performance.now();
  let a = 1;
  if (state.ts && state.pts && state.ts > state.pts) {
    const renderTime = now - TICK_MS * 1.5;
    a = Math.max(0, Math.min(1, (renderTime - state.pts) / (state.ts - state.pts)));
  }
  const px = state.px + (state.x - state.px) * a;
  const py = state.py + (state.y - state.py) * a;

  let goalX = px - VW / 2;
  let goalY = py - 30 - VH / 2;

  goalX = Math.max(0, Math.min(goalX, worldW - VW));
  goalY = Math.max(0, Math.min(goalY, worldH + 120 - VH));

  camX += (goalX - camX) * CAM_LERP;
  camY += (goalY - camY) * CAM_LERP;
}

// ─── Rendering ────────────────────────────────────────────────────────────────

const TICK_MS = 1000 / 60;
const DT = 1 / 60;

const STATIC_COLOR   = { fill: "rgba(120,160,200,0.12)", stroke: "#4a6070" };
const ONEWAY_COLOR   = { fill: "rgba(163,113,247,0.15)", stroke: "#a371f7" };
const BOUNCE_COLOR   = { fill: "rgba(248,81,73,0.3)",    stroke: "#f85149" };
const ICE_COLOR      = { fill: "rgba(140,210,255,0.25)", stroke: "#8cd2ff" };
const WATER_COLOR    = { fill: "rgba(50,120,220,0.15)",  stroke: "rgba(80,160,255,0.3)" };

const OBJECT_COLORS = [
  { fill: "rgba(88,166,255,0.18)",  stroke: "#58a6ff" },
  { fill: "rgba(210,153,34,0.18)",  stroke: "#d29922" },
  { fill: "rgba(63,185,80,0.18)",   stroke: "#3fb950" },
];

function getBodyColor(id) {
  const pm = playerMeta.find(p => p.bodyId === id);
  if (pm && playerColors.length) {
    const c = playerColors[pm.colorIdx % playerColors.length];
    return { fill: c.fill, stroke: c.stroke };
  }
  return OBJECT_COLORS[id % OBJECT_COLORS.length];
}

function drawRoundRect(x, y, w, h, r = 4) {
  const l = x - w / 2, t = y - h / 2;
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(l + rr, t);
  ctx.lineTo(l + w - rr, t);
  ctx.arc(l + w - rr, t + rr,     rr, -Math.PI / 2, 0);
  ctx.lineTo(l + w, t + h - rr);
  ctx.arc(l + w - rr, t + h - rr, rr, 0,            Math.PI / 2);
  ctx.lineTo(l + rr, t + h);
  ctx.arc(l + rr,     t + h - rr, rr, Math.PI / 2,  Math.PI);
  ctx.lineTo(l, t + rr);
  ctx.arc(l + rr,     t + rr,     rr, Math.PI,       -Math.PI / 2);
  ctx.closePath();
}

function drawCapsule(x, y, w, h) {
  // Vertical capsule (w=width, h=total height)
  const r = w / 2;
  const bodyH = h - w; // straight section height
  const l = x - r;
  const t = y - h / 2;
  ctx.beginPath();
  // Top semicircle
  ctx.arc(x, t + r, r, Math.PI, 0);
  // Right side
  ctx.lineTo(x + r, t + r + bodyH);
  // Bottom semicircle
  ctx.arc(x, t + r + bodyH, r, 0, Math.PI);
  ctx.closePath();
}

function render() {
  ctx.clearRect(0, 0, VW, VH);
  const now = performance.now();

  // Update coin popups
  for (let i = coinPopups.length - 1; i >= 0; i--) {
    coinPopups[i].timer -= DT;
    coinPopups[i].y -= 30 * DT;
    if (coinPopups[i].timer <= 0) coinPopups.splice(i, 1);
  }

  updateCamera();

  ctx.save();
  ctx.translate(-camX, -camY);

  // ── Grid ──
  const gridSize = 50;
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  const gx0 = Math.floor(camX / gridSize) * gridSize;
  const gy0 = Math.floor(camY / gridSize) * gridSize;
  for (let x = gx0; x < camX + VW + gridSize; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, camY); ctx.lineTo(x, camY + VH); ctx.stroke();
  }
  for (let y = gy0; y < camY + VH + gridSize; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(camX, y); ctx.lineTo(camX + VW, y); ctx.stroke();
  }

  // ── Level geometry ──
  for (const part of level) {
    // Culling
    const px = part.x, py = part.y, pw = (part.w || 0), ph = (part.h || 0);
    if (px + pw / 2 < camX - 50 || px - pw / 2 > camX + VW + 50) continue;
    if (py + ph / 2 < camY - 50 || py - ph / 2 > camY + VH + 50) continue;

    let c;
    switch (part.type) {
      case "oneWay": c = ONEWAY_COLOR; break;
      case "bounce": c = BOUNCE_COLOR; break;
      case "ice":    c = ICE_COLOR;    break;
      case "water":  c = WATER_COLOR;  break;
      default:       c = STATIC_COLOR; break;
    }

    ctx.save();
    ctx.translate(px, py);
    if (part.angle) ctx.rotate(part.angle);

    if (part.type === "water") {
      // Water fill
      ctx.fillStyle = c.fill;
      ctx.fillRect(-pw / 2, -ph / 2, pw, ph);
      // Animated wave
      ctx.strokeStyle = c.stroke;
      ctx.lineWidth = 1;
      ctx.beginPath();
      const waveY = -ph / 2;
      for (let wx = -pw / 2; wx <= pw / 2; wx += 4) {
        const wy = waveY + Math.sin((px + wx + now * 0.003) * 0.05) * 3;
        wx === -pw / 2 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
      }
      ctx.stroke();
    } else {
      drawRoundRect(0, 0, pw, ph, 3);
      ctx.fillStyle = c.fill; ctx.fill();
      ctx.strokeStyle = c.stroke; ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.restore();
  }

  // ── Coins ──
  for (const coin of coinDefs) {
    if (!coin.alive) continue;
    if (coin.x < camX - 20 || coin.x > camX + VW + 20) continue;
    if (coin.y < camY - 20 || coin.y > camY + VH + 20) continue;
    ctx.save();
    ctx.translate(coin.x, coin.y);
    // Pulsing glow
    const pulse = 0.6 + 0.4 * Math.sin(now * 0.004 + coin.id);
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(210,153,34,${0.3 * pulse})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = "#d29922";
    ctx.fill();
    ctx.strokeStyle = "#ffcc00";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  // ── Dynamic bodies (interpolated) ──
  for (const [id, state] of bodyState) {
    // Per-body interpolation
    let a = 1;
    if (state.ts && state.pts && state.ts > state.pts) {
      const renderTime = now - TICK_MS * 1.5;
      a = Math.max(0, Math.min(1, (renderTime - state.pts) / (state.ts - state.pts)));
    }
    const ix = state.px + (state.x - state.px) * a;
    const iy = state.py + (state.y - state.py) * a;
    const irot = state.prot + (state.rot - state.prot) * a;

    // Culling
    if (ix < camX - 60 || ix > camX + VW + 60) continue;
    if (iy < camY - 60 || iy > camY + VH + 60) continue;

    const c = getBodyColor(id);
    const pm = playerMeta.find(p => p.bodyId === id);
    const isMe = id === myBodyId;

    // Moving platform?
    const mp = movingPlatforms.find(m => m.bodyId === id);
    if (mp) {
      ctx.save();
      ctx.translate(ix, iy);
      ctx.rotate(irot);
      drawRoundRect(0, 0, mp.w, mp.h, 3);
      ctx.fillStyle = ONEWAY_COLOR.fill; ctx.fill();
      ctx.strokeStyle = ONEWAY_COLOR.stroke; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.restore();
      continue;
    }

    ctx.save();
    ctx.translate(ix, iy);
    ctx.rotate(irot);

    if (pm) {
      // Player: capsule shape
      ctx.save();
      ctx.rotate(-irot); // undo body rotation for upright capsule
      drawCapsule(0, 0, 20, 36);
      ctx.fillStyle = c.fill; ctx.fill();
      ctx.strokeStyle = c.stroke; ctx.lineWidth = isMe ? 2.5 : 1.5; ctx.stroke();

      // Eye indicator
      const eyeX = keys.right ? 3 : keys.left ? -3 : 3;
      ctx.beginPath();
      ctx.arc(eyeX, -10, 2, 0, Math.PI * 2);
      ctx.fillStyle = c.stroke;
      ctx.fill();

      // "Me" indicator
      if (isMe) {
        ctx.beginPath();
        ctx.arc(0, -22, 4, 0, Math.PI * 2);
        ctx.fillStyle = c.stroke; ctx.fill();
      }
      ctx.restore();
    } else {
      // Scene object
      const obj = sceneObjects.find(o => o.id === id);
      if (obj) {
        if (obj.shape === "circle") {
          ctx.beginPath();
          ctx.arc(0, 0, obj.size, 0, Math.PI * 2);
          ctx.fillStyle = c.fill; ctx.fill();
          ctx.strokeStyle = c.stroke; ctx.lineWidth = 1.2; ctx.stroke();
        } else {
          drawRoundRect(0, 0, obj.size, obj.size, 3);
          ctx.fillStyle = c.fill; ctx.fill();
          ctx.strokeStyle = c.stroke; ctx.lineWidth = 1.2; ctx.stroke();
        }
      }
    }

    ctx.restore();
  }

  // ── Coin pickup popups (world space) ──
  for (const p of coinPopups) {
    const alpha = Math.min(1, p.timer * 2);
    ctx.fillStyle = `rgba(210,153,34,${alpha})`;
    ctx.font = "bold 14px monospace";
    ctx.textAlign = "center";
    ctx.fillText("+1", p.x, p.y);
  }
  ctx.textAlign = "left";

  ctx.restore();

  // ── HUD (screen space) ──
  // Legend
  const ly = VH - 12;
  ctx.font = "10px monospace";
  ctx.fillStyle = "#a371f7";
  ctx.fillText("\u25AC one-way", 10, ly);
  ctx.fillStyle = "#607888";
  ctx.fillText("\u25AC solid", 100, ly);
  ctx.fillStyle = "#f85149";
  ctx.fillText("\u25AC bounce", 170, ly);
  ctx.fillStyle = "#8cd2ff";
  ctx.fillText("\u25AC ice", 250, ly);
  ctx.fillStyle = "rgba(50,120,220,0.6)";
  ctx.fillText("\u25AC water", 300, ly);
  ctx.fillStyle = "#d29922";
  ctx.fillText("\u25CF coin", 370, ly);
}

// ─── Game loop ────────────────────────────────────────────────────────────────

function loop() {
  requestAnimationFrame(loop);
  render();
}
requestAnimationFrame(loop);

// ─── UI helpers ───────────────────────────────────────────────────────────────

function setStatus(connected, text) {
  document.getElementById("statusDot").className = "mp-status-dot" + (connected ? " connected" : "");
  document.getElementById("statusText").textContent = text;
}

function setOverlay(visible, text = "") {
  const el = document.getElementById("overlay");
  el.className = "mp-overlay" + (visible ? "" : " hidden");
  if (text) document.getElementById("overlayText").textContent = text;
}

function updatePlayerListUI() {
  const list = document.getElementById("playerList");
  list.innerHTML = "";
  for (const p of playerMeta) {
    const c = playerColors[p.colorIdx % playerColors.length] || { stroke: "#888" };
    const badge = document.createElement("div");
    badge.className = "player-badge" + (p.id === myPlayerId ? " me" : "");
    badge.innerHTML = `<span class="dot" style="color:${c.stroke}"></span>P${p.id}${p.id === myPlayerId ? " (you)" : ""}`;
    list.appendChild(badge);
  }
}

// ─── Start ────────────────────────────────────────────────────────────────────
connect();
</script>
